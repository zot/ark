<script type="module">
const highlights = new URL(location.href).searchParams.getAll('highlight');

// R1459-R1463, R1476: highlight regex matches in plain-text previews.
// Two paths: <ark-tag> elements get a highlight class on matching children;
// bare text nodes get <mark> wrappers via DOM splitting (preserves elements).
// <pdf-chunk> manages its own highlight overlay via the `highlight` attribute;
// we forward the patterns to it and never touch its subtree.
function applyHighlights(patterns) {
  const pre = document.getElementById('content');
  const HL = 'ark-search-highlight';

  // Forward to <pdf-chunk> children. Their own observed-attribute path
  // rebuilds the overlay; on empty patterns we drop the attribute.
  for (const pc of pre.querySelectorAll('pdf-chunk')) {
    if (patterns.length) pc.setAttribute('highlight', patterns.join('\n'));
    else pc.removeAttribute('highlight');
  }

  // R1466: live re-highlighting must replace, not accumulate. Unwrap any
  // prior <mark> wrappers and drop the class from <ark-tag> children before
  // re-applying — otherwise nested marks accumulate as the query changes.
  for (const m of pre.querySelectorAll('mark.' + HL)) {
    const parent = m.parentNode;
    while (m.firstChild) parent.insertBefore(m.firstChild, m);
    parent.removeChild(m);
  }
  for (const el of pre.querySelectorAll('.' + HL)) {
    el.classList.remove(HL);
  }
  pre.normalize();

  if (!patterns.length) return;

  const regexes = [];
  for (const p of patterns) {
    try { regexes.push(new RegExp(p, 'gm')); } catch {}
  }
  if (!regexes.length) return;

  // Highlight <ark-tag> elements: reconstruct the full tag text
  // (@name: value) and test each regex against it.
  for (const tag of pre.querySelectorAll('ark-tag')) {
    const nameEl = tag.querySelector('name');
    const valueEl = tag.querySelector('value');
    if (!nameEl) continue;
    const full = '@' + nameEl.textContent + ': ' + (valueEl ? valueEl.textContent : '');
    for (const re of regexes) {
      re.lastIndex = 0;
      const m = re.exec(full);
      if (!m) continue;
      // No capture group → highlight the whole tag (name match).
      // Capture group → highlight the value element (token match).
      if (m[1] !== undefined && valueEl) {
        valueEl.classList.add(HL);
      } else {
        nameEl.classList.add(HL);
      }
    }
  }

  // Highlight bare text nodes: walk text, skip subtrees we don't own.
  // <ark-tag> handles its own highlight class above; <pdf-chunk> manages
  // its overlay via the `highlight` attribute — wrapping a <mark> inside
  // its positioned text layer would make the invisible selection text
  // suddenly visible.
  const walker = document.createTreeWalker(pre, NodeFilter.SHOW_TEXT, {
    acceptNode: (n) => {
      const p = n.parentElement;
      if (!p) return NodeFilter.FILTER_REJECT;
      if (p.closest('ark-tag, pdf-chunk')) return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const textNodes = [];
  while (walker.nextNode()) textNodes.push(walker.currentNode);

  for (const node of textNodes) {
    const text = node.nodeValue;
    const spans = [];
    for (const re of regexes) {
      re.lastIndex = 0;
      let m;
      while ((m = re.exec(text)) !== null) {
        if (m[0].length === 0) { re.lastIndex++; continue; }
        const hasGroup = m[1] !== undefined;
        const gLen = hasGroup ? m[1].length : m[0].length;
        const gOff = hasGroup ? m[0].length - m[1].length : 0;
        spans.push([m.index + gOff, m.index + gOff + gLen]);
      }
    }
    if (!spans.length) continue;
    spans.sort((a, b) => a[0] - b[0]);
    // Merge overlapping.
    const merged = [spans[0]];
    for (let i = 1; i < spans.length; i++) {
      const prev = merged[merged.length - 1];
      if (spans[i][0] <= prev[1]) prev[1] = Math.max(prev[1], spans[i][1]);
      else merged.push(spans[i]);
    }
    // Split text node at match boundaries, wrap matches in <mark>.
    const frag = document.createDocumentFragment();
    let pos = 0;
    for (const [s, e] of merged) {
      if (s > pos) frag.appendChild(document.createTextNode(text.slice(pos, s)));
      const mark = document.createElement('mark');
      mark.className = HL;
      mark.textContent = text.slice(s, e);
      frag.appendChild(mark);
      pos = e;
    }
    if (pos < text.length) frag.appendChild(document.createTextNode(text.slice(pos)));
    node.parentNode.replaceChild(frag, node);
  }
}

applyHighlights(highlights);

// R1466: live highlight updates from parent window.
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'ark-set-highlights' && Array.isArray(e.data.patterns)) {
    applyHighlights(e.data.patterns);
  }
});

// R1491: load <ark-search> element for inline search panels.
const { ArkSearchElement } = await import('/ark-search-element.js{{.BundleHash}}');
// R1709: register <pdf-chunk> so PDF search results render as page regions.
await import('/pdf-chunk-element.js{{.BundleHash}}');
// R2032-R2050, R2065-R2072: tag-overview sidebar + <ark-ext-tags> element.
await import('/tag-overview.js{{.BundleHash}}');

// R1483, R1491: SearchAPI for <ark-tag> inline panels.
const api = {
  search: (query, mode) => fetch('/search/grouped', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({query, mode}),
  }).then(r => r.json()),
  searchFiltered: (query, request) => fetch('/search/grouped', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      query,
      mode: request.mode,
      chunk_filters: request.chunkFilters,
      filter_files: request.filterFiles,
      exclude_files: request.excludeFiles,
      primary_tag_query: request.primaryTagQuery,
      primary_file_tag: request.primaryFileTag,
    }),
  }).then(r => r.json()),
  tagComplete: (prefix) => fetch('/tags/complete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({prefix}),
  }).then(r => r.json()),
  tagValueComplete: (tag, prefix) => fetch('/tags/values', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tag, prefix}),
  }).then(r => r.json()),
  navigate: (p) => { window.location.href = '/content' + p; },
};
document.arkSearchAPI = api;

// R1476-R1484, R1492: <ark-tag> custom element — interactive tag widgets.
if (!customElements.get('ark-tag')) {
  let activePanel = null;
  let activePanelOwner = null;
  customElements.define('ark-tag', class extends HTMLElement {
    _btn = null;
    _isOpen = false;
    connectedCallback() {
      this._btn = document.createElement('span');
      this._btn.className = 'ark-tag-action';
      this._btn.textContent = '\u25B6'; // ▶
      this._btn.title = 'Search this tag';
      this._btn.addEventListener('click', this._onToggle);
      this.prepend(this._btn);
    }
    _setOpen(open) {
      this._isOpen = open;
      this._btn.classList.toggle('open', open);
      this._btn.title = open ? 'Close search' : 'Search this tag';
    }
    _onToggle = (e) => {
      e.preventDefault();
      e.stopPropagation();
      const nameEl = this.querySelector('name');
      const valueEl = this.querySelector('value');
      const name = nameEl ? nameEl.textContent : '';
      const value = valueEl ? valueEl.textContent : '';

      // R1484: dispatch event for external listeners.
      this.dispatchEvent(new CustomEvent('ark-tag-click', {
        bubbles: true, detail: { name, value }
      }));

      // R1482: toggle — if this tag's panel is open, close it.
      if (activePanelOwner === this && activePanel) {
        activePanel.remove();
        activePanel = null;
        this._setOpen(false);
        activePanelOwner = null;
        return;
      }
      // Close any other open panel.
      if (activePanelOwner && activePanelOwner !== this) {
        activePanel.remove();
        activePanelOwner._setOpen(false);
        activePanel = null;
        activePanelOwner = null;
      }

      // R1481, R1483: create inline <ark-search> panel.
      if (!document.arkSearchAPI) return;
      const search = document.createElement('ark-search');
      search.api = document.arkSearchAPI;
      search.tag = name;
      search.value = value;
      search.addEventListener('close', () => {
        search.remove();
        if (activePanelOwner === this) {
          this._setOpen(false);
          activePanel = null;
          activePanelOwner = null;
        }
      });

      // Insert right after this tag element.
      this.after(search);
      activePanel = search;
      activePanelOwner = this;
      this._setOpen(true);
    };
  });
}

// R1465: signal the parent iframe host that this content is ready to show.
if (window !== window.parent) {
  function postHeight() {
    window.parent.postMessage({ type: 'ark-content-height', height: document.body.scrollHeight, src: location.href }, '*');
  }
  window.parent.postMessage({ type: 'ark-content-ready', src: location.href }, '*');
  postHeight();
  window.addEventListener('load', postHeight);
  new ResizeObserver(postHeight).observe(document.body);
}

// R2415-R2420: curate pin button. Same shape as content-markdown.html;
// see that file for the duplication note (O98).
installCuratePins(decodeURIComponent(location.pathname.replace(/^\/content/, '')));
async function installCuratePins(filePath) {
  const chunks = document.querySelectorAll(
    'div.ark-chunk[data-chunkid], ark-curate-region[chunkid]'
  );
  if (chunks.length === 0) return;
  let pinned = new Set();
  try {
    const res = await fetch('/curation/pinned');
    if (res.ok) {
      const data = await res.json();
      for (const id of (data.chunkIDs || [])) pinned.add(String(id));
    }
  } catch (err) {
    console.warn('curate-pin: failed to fetch pinned set', err);
  }
  const pinSVG = '<svg viewBox="0 0 16 16" aria-hidden="true">' +
    '<path class="pin-fill" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"' +
    ' d="M9.5 2.5l4 4-2 1-1 3-3-3-3.5 4.5 4.5-3.5-3-3 3-1 1-2z"/></svg>';
  for (const chunk of chunks) {
    const cid = chunk.dataset.chunkid || chunk.getAttribute('chunkid');
    if (!cid) continue;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'ark-curate-pin';
    btn.setAttribute('aria-pressed', pinned.has(cid) ? 'true' : 'false');
    btn.title = pinned.has(cid) ? 'Unpin from workshop' : 'Pin to workshop';
    btn.innerHTML = pinSVG;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCuratePin(btn, chunk, filePath);
    });
    chunk.prepend(btn);
  }
}
async function toggleCuratePin(btn, chunk, filePath) {
  const wasPinned = btn.getAttribute('aria-pressed') === 'true';
  const cid = Number(chunk.dataset.chunkid || chunk.getAttribute('chunkid'));
  const fid = Number(chunk.dataset.fileid || chunk.getAttribute('fileid') || 0);
  const url = wasPinned ? '/curation/dismiss' : '/curation/pin';
  const body = wasPinned ? { chunkID: cid } : { chunkID: cid, fileID: fid, path: filePath };
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      console.warn('curate-pin: server returned', res.status);
      return;
    }
    btn.setAttribute('aria-pressed', wasPinned ? 'false' : 'true');
    btn.title = wasPinned ? 'Pin to workshop' : 'Unpin from workshop';
  } catch (err) {
    console.warn('curate-pin: request failed', err);
  }
}
</script>
