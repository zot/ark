  <script>
    // Client-local wait time — updates live tooltip every 200ms
    (function() {
      function update() {
        const tip = document.querySelector('.mcp-menu-tip');
        const timestampEl = document.querySelector('.mcp-wait-timestamp');
        if (!tip || !timestampEl) return;

        const serverTimestamp = parseInt(timestampEl.textContent, 10) || 0;
        if (!serverTimestamp) { tip.textContent = ''; return; }

        const elapsed = Math.floor(Date.now() / 1000) - serverTimestamp;
        tip.textContent = elapsed > 5 ? 'Waiting (' + elapsed + 's)' : 'Waiting';
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => { setInterval(update, 200); });
      } else {
        setInterval(update, 200);
      }
    })();
  </script>

  <script>
    // Image drag & drop / paste handling
    (function() {
      const panel = document.getElementById('mcp-chat-panel');
      if (!panel) return;

      let dragCounter = 0;

      panel.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        panel.classList.add('drag-over');
      });

      panel.addEventListener('dragleave', (e) => {
        dragCounter--;
        if (dragCounter <= 0) {
          dragCounter = 0;
          panel.classList.remove('drag-over');
        }
      });

      panel.addEventListener('dragover', (e) => {
        e.preventDefault();
      });

      panel.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        panel.classList.remove('drag-over');
        if (e.dataTransfer && e.dataTransfer.files) {
          handleImageFiles(e.dataTransfer.files);
        }
      });

      // Paste handler
      panel.addEventListener('paste', (e) => {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        const files = [];
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const file = item.getAsFile();
            if (file) files.push(file);
          }
        }
        if (files.length > 0) handleImageFiles(files);
      });

      function handleImageFiles(files) {
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          const reader = new FileReader();
          reader.onload = (e) => {
            const dataUri = e.target.result;
            const base64Data = dataUri.split(',')[1];
            generateThumbnail(dataUri, 150).then((thumbnail) => {
              const payload = JSON.stringify({
                filename: file.name || 'image.png',
                mime: file.type,
                base64: base64Data,
                thumbnail: thumbnail,
                fullUri: dataUri
              });
              const tryUpdate = () => {
                if (window.uiApp) {
                  window.uiApp.updateValue('image-bridge', payload);
                } else {
                  setTimeout(tryUpdate, 50);
                }
              };
              tryUpdate();
            });
          };
          reader.readAsDataURL(file);
        }
      }

      function generateThumbnail(dataUri, maxDim) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = () => resolve('');
          img.src = dataUri;
        });
      }
    })();
  </script>

  <script>
    // Chat panel resize handle (timer-loop drag)
    // See .ui/patterns/event-compression.md
    (function() {
      const panel = document.getElementById('mcp-chat-panel');
      const handle = document.getElementById('mcp-chat-resize-handle');
      if (!panel || !handle) return;

      let startY, startHeight, currentY, lastY, rafId;

      handle.addEventListener('mousedown', (e) => {
        startY = currentY = lastY = e.clientY;
        startHeight = panel.offsetHeight;
        panel.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', onRelease);
        rafLoop();
        e.preventDefault();
      });

      function onDrag(e) {
        currentY = e.clientY;
      }

      function rafLoop() {
        rafId = requestAnimationFrame(() => {
          if (currentY !== lastY) {
            lastY = currentY;
            const height = Math.max(120, Math.min(window.innerHeight * 0.6, startHeight + (startY - currentY)));
            panel.style.height = height + 'px';
          }
          rafLoop();
        });
      }

      function onRelease() {
        cancelAnimationFrame(rafId);
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', onRelease);
        panel.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = '');
      }
    })();
  </script>


  <script>
    // Find which viewdef an element belongs to by walking up and checking preceding siblings
    window.uiApp.findViewdef = function(elementId) {
      var el = document.getElementById(elementId);
      while (el) {
        if (el.getAttribute && el.getAttribute('ui-viewdef')) return el.getAttribute('ui-viewdef');
        var sib = el.previousElementSibling;
        while (sib) {
          if (sib.getAttribute && sib.getAttribute('ui-viewdef')) return sib.getAttribute('ui-viewdef');
          sib = sib.previousElementSibling;
        }
        el = el.parentElement;
      }
      return null;
    };
    // Find viewdef and send result to Lua via bridge
    window.uiApp.reportViewdef = function(elementId) {
      window.uiApp.updateValue('viewdef-bridge', window.uiApp.findViewdef(elementId) || '');
    };
  </script>

  <script>
    // Mouse tracker + highlight utility for agent-driven UI pointing
    (function() {
      window._mousePos = {x: 0, y: 0};
      document.addEventListener("mousemove", function(e) {
        window._mousePos.x = e.clientX;
        window._mousePos.y = e.clientY;
      });

      window.uiApp.highlight = function(elementId) {
        var mp = window._mousePos;
        var el = document.getElementById(elementId);
        if (el == null) return;
        var r = el.getBoundingClientRect();
        if (r.width == 0) return;
        var br = getComputedStyle(el).borderRadius;
        // Box-shadow ring
        el.style.boxShadow = "0 0 0 3px #E07A47, 0 0 12px rgba(224,122,71,0.6)";
        el.style.transition = "box-shadow 2s ease-out";
        setTimeout(function() { el.style.boxShadow = "0 0 0 3px transparent"; }, 2000);
        setTimeout(function() { el.style.boxShadow = ""; el.style.transition = ""; }, 4000);
        // Translucent overlay
        var ov = document.createElement("div");
        ov.style.cssText = "position:fixed;pointer-events:none;z-index:9998;background:rgba(224,122,71,0.15);border:2px solid rgba(224,122,71,0.5);border-radius:" + br + ";transition:opacity 2s ease-out;";
        ov.style.left = r.left + "px"; ov.style.top = r.top + "px";
        ov.style.width = r.width + "px"; ov.style.height = r.height + "px";
        document.body.appendChild(ov);
        setTimeout(function() { ov.style.opacity = "0"; }, 1000);
        setTimeout(function() { ov.remove(); }, 3000);
        // SVG dashed connector from mouse to element center
        var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        var svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.style.cssText = "position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:9999;";
        var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", mp.x); line.setAttribute("y1", mp.y);
        line.setAttribute("x2", cx); line.setAttribute("y2", cy);
        line.setAttribute("stroke", "#E07A47"); line.setAttribute("stroke-width", "2");
        line.setAttribute("stroke-dasharray", "6 4");
        var dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", cx); dot.setAttribute("cy", cy);
        dot.setAttribute("r", "4"); dot.setAttribute("fill", "#E07A47");
        svg.appendChild(line); svg.appendChild(dot);
        document.body.appendChild(svg);
        setTimeout(function() { svg.style.transition = "opacity 2s ease-out"; svg.style.opacity = "0"; }, 1000);
        setTimeout(function() { svg.remove(); }, 3000);
      };
    })();
  </script>
