<template>
  <div class="msg-app">
    <div class="msg-header panel-header">
      <span class="panel-title">Messages</span>
      <div class="msg-header-actions">
        <span class="msg-count" ui-value="statusText()"></span>
        <span class="msg-sort-control">
          <span class="msg-sort-field" ui-value="sortLabel()" ui-event-click="cycleSortField()" title="Click to cycle sort field"></span>
          <span class="msg-sort-dir" ui-value="sortDirLabel()" ui-event-click="toggleSortDir()" title="Click to toggle direction"></span>
        </span>
        <sl-icon-button name="arrow-clockwise" ui-action="refresh()" label="Refresh"></sl-icon-button>
      </div>
    </div>

    <!-- Filter chips -->
    <div class="msg-chips">
      <div ui-view="chips()?wrapper=lua.ViewList" ui-namespace="msg-chip"></div>
      <div class="msg-schip-row">
        <div ui-view="statusChips()?wrapper=lua.ViewList" ui-namespace="msg-status-chip"></div>
      </div>
    </div>

    <!-- Empty state -->
    <div class="msg-empty" ui-class-hidden="messageCount()">
      <sl-icon name="envelope-open" class="msg-empty-icon"></sl-icon>
      <p>No messages</p>
    </div>

    <!-- Kanban columns -->
    <div class="msg-kanban">
      <div ui-view="columns?wrapper=lua.ViewList" ui-namespace="KANBAN"></div>
    </div>

    <!-- Message detail dialog -->
    <sl-dialog class="msg-detail-dialog" ui-attr-open="detail().isOpen()" ui-event-sl-request-close="detail().close()">
      <span slot="label" ui-value="detail().title()"></span>

      <div class="msg-detail-meta">
        <span class="msg-detail-projects" ui-value="detail().projectLabel()"></span>
        <span class="msg-detail-date" ui-class-hidden="detail().noDate()" ui-value="detail().dateLabel()"></span>
      </div>

      <div class="msg-detail-controls">
        <div class="msg-detail-field">
          <label class="msg-detail-label">Status</label>
          <sl-select size="small" ui-value="detail().status" ui-event-sl-input="detail().onStatusChange()" hoist>
            <sl-option value="open">Open</sl-option>
            <sl-option value="accepted">Accepted</sl-option>
            <sl-option value="in-progress">In Progress</sl-option>
            <sl-option value="future">Future</sl-option>
            <sl-option value="completed">Completed</sl-option>
            <sl-option value="denied">Denied</sl-option>
          </sl-select>
        </div>
        <div class="msg-detail-field">
          <label class="msg-detail-label">Response handled</label>
          <sl-select size="small" ui-value="detail().reqResponseHandled" ui-event-sl-input="detail().onReqResponseHandled()" hoist placeholder="—">
            <sl-option value="">—</sl-option>
            <sl-option value="completed">Completed</sl-option>
            <sl-option value="acknowledged">Acknowledged</sl-option>
          </sl-select>
        </div>
        <div class="msg-detail-field" ui-class-hidden="detail().noResponse()">
          <label class="msg-detail-label">Request handled</label>
          <sl-select size="small" ui-value="detail().respRequestHandled" ui-event-sl-input="detail().onRespRequestHandled()" hoist placeholder="—">
            <sl-option value="">—</sl-option>
            <sl-option value="completed">Completed</sl-option>
            <sl-option value="acknowledged">Acknowledged</sl-option>
          </sl-select>
        </div>
      </div>

      <div class="msg-detail-tabs" ui-class-hidden="detail().noResponse()">
        <span class="msg-detail-tab" ui-class-msg-detail-tab-active="detail().isRequestTab()" ui-event-click="detail().showRequest()">Request</span>
        <span class="msg-detail-tab" ui-class-msg-detail-tab-active="detail().isResponseTab()" ui-event-click="detail().showResponse()">Response</span>
      </div>

      <div class="msg-detail-body" ui-html="detail().bodyHtml()"></div>

      <div slot="footer" class="msg-detail-footer">
        <sl-button size="small" variant="default" ui-action="detail().openInEditor()">
          <sl-icon slot="prefix" name="pencil-square"></sl-icon>
          Edit
        </sl-button>
        <sl-button size="small" variant="success" ui-action="detail().complete()">
          <sl-icon slot="prefix" name="check-circle"></sl-icon>
          Complete
        </sl-button>
      </div>
    </sl-dialog>
  </div>

  <style>
    .msg-app {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: var(--term-mono, 'JetBrains Mono', monospace);
      font-size: 13px;
      color: var(--term-text, #e0e0e8);
      background: var(--term-bg, #0a0a0f);
    }

    .msg-header {
      flex-shrink: 1;
    }

    .msg-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .msg-chips {
      padding: 4px 12px;
      flex-shrink: 0;
    }

    .msg-chip-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .msg-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      border: 1px solid var(--term-border, #2a2a3a);
    }

    .msg-chip-inactive {
      opacity: 0.3;
      background: var(--term-accent, #E07A47);
      color: var(--term-bg, #0a0a0f);
      border-color: var(--term-accent, #E07A47);
    }

    .msg-chip-inactive:hover {
      opacity: 0.5;
    }

    .msg-chip-active {
      opacity: 1;
      background: var(--term-accent, #E07A47);
      color: var(--term-bg, #0a0a0f);
      border-color: var(--term-accent, #E07A47);
    }

    .msg-chip-empty {
      opacity: 0.4;
      background: var(--term-accent, #E07A47);
      color: var(--term-bg, #0a0a0f);
      border-color: var(--term-accent, #E07A47);
    }

    .msg-count {
      font-size: 11px;
      color: var(--term-text-dim, #8888a0);
    }

    .msg-sort-control {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 11px;
      color: var(--term-text-dim, #8888a0);
    }

    .msg-sort-field {
      cursor: pointer;
      padding: 1px 6px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .msg-sort-field:hover {
      color: var(--term-text, #e0e0e8);
      background: var(--term-bg-hover, #1a1a24);
    }

    .msg-sort-dir {
      cursor: pointer;
      padding: 1px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .msg-sort-dir:hover {
      color: var(--term-text, #e0e0e8);
      background: var(--term-bg-hover, #1a1a24);
    }

    .msg-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--term-text-dim, #8888a0);
      gap: 12px;
    }

    .msg-empty.hidden { display: none; }

    .msg-empty-icon {
      font-size: 48px;
      opacity: 0.3;
    }

    .msg-kanban {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .kanban-columns {
      display: flex;
      gap: 12px;
      min-height: 100%;
      min-width: min-content;
    }

    .kanban-column-slot {
      display: contents;
    }

    /* Status column */
    .msg-column {
      min-width: 220px;
      max-width: 300px;
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--term-bg-elevated, #12121a);
      border-radius: 6px;
      border: 1px solid var(--term-border, #2a2a3a);
      overflow: hidden;
    }

    .msg-column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--term-border, #2a2a3a);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--term-text-dim, #8888a0);
    }

    .msg-column-count {
      font-size: 10px;
      opacity: 0.6;
      font-variant-numeric: tabular-nums;
    }

    .msg-column-cards {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Message card */
    .msg-card {
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid var(--term-border, #2a2a3a);
      background: var(--term-bg, #0a0a0f);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .msg-card:hover {
      border-color: var(--term-accent, #E07A47);
      background: var(--term-bg-hover, #1a1a24);
    }

    .msg-card-summary {
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .msg-card-projects {
      font-size: 11px;
      font-weight: bold;
      font-style: italic;
      color: var(--term-text, #e0e0e8);
      margin-bottom: 4px;
    }

    .msg-card-response {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--term-border, #2a2a3a);
      font-size: 10px;
    }

    .msg-card-bookmark {
      font-size: 10px;
      color: #fbbf24;
      margin-bottom: 6px;
      padding: 3px 0 5px;
      border-bottom: 1px dashed color-mix(in srgb, #fbbf24 30%, transparent);
      font-family: var(--term-mono, 'JetBrains Mono', monospace);
      letter-spacing: 0.03em;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .msg-bookmark-pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      border: 1px solid color-mix(in srgb, #fbbf24 40%, transparent);
      background: color-mix(in srgb, #fbbf24 8%, transparent);
      white-space: nowrap;
    }

    .msg-card-bookmark.hidden { display: none; }

    .msg-card-response.hidden { display: none; }

    .msg-resp-indicator {
      opacity: 0.4;
    }

    .msg-resp-status {
      font-size: 10px;
    }

    /* Status chip row */
    .msg-schip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
    }

    .msg-schip-label {
      font-size: 10px;
      color: var(--term-text-dim, #8888a0);
      opacity: 0.6;
      flex-shrink: 0;
    }

    .msg-schip {
      display: inline-flex;
      align-items: center;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      border: 1px solid transparent;
    }

    .msg-schip-visible {
      opacity: 1;
      border-color: currentColor;
    }

    .msg-schip-empty {
      opacity: 0.3;
      border-color: currentColor;
    }

    .msg-schip-hidden {
      opacity: 0.6;
      border-color: currentColor;
      text-decoration: line-through;
    }

    .msg-schip-hidden:hover {
      opacity: 0.8;
    }

    .msg-schip-empty:hover {
      opacity: 0.6;
    }

    /* Status colors for column headers and badges */
    .msg-status-open { color: #fbbf24; }
    .msg-status-active { color: #60a5fa; }
    .msg-status-done { color: #4ade80; }
    .msg-status-denied { color: #f87171; }
    .msg-status-future { color: var(--term-text-dim, #8888a0); }

    /* Message detail dialog */
    .msg-detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .msg-detail-projects {
      font-weight: bold;
      font-style: italic;
      color: var(--term-text, #e0e0e8);
    }

    .msg-detail-date {
      color: var(--term-text-dim, #8888a0);
      font-size: 11px;
    }

    .msg-detail-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .msg-detail-field {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 140px;
    }

    .msg-detail-field.hidden { display: none; }

    .msg-detail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--term-text-dim, #8888a0);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .msg-detail-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--term-border, #2a2a3a);
    }

    .msg-detail-tabs.hidden { display: none; }

    .msg-detail-tab {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--term-text-dim, #8888a0);
      padding: 6px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .msg-detail-tab:hover {
      color: var(--term-text, #e0e0e8);
    }

    .msg-detail-tab-active {
      color: var(--term-accent, #E07A47);
      border-bottom-color: var(--term-accent, #E07A47);
    }

    .msg-detail-body {
      font-size: 13px;
      line-height: 1.6;
      color: var(--term-text, #e0e0e8);
      overflow-y: auto;
    }

    .msg-detail-body h1,
    .msg-detail-body h2,
    .msg-detail-body h3 {
      margin-top: 12px;
      margin-bottom: 6px;
      color: var(--term-text, #e0e0e8);
    }

    .msg-detail-body h1 { font-size: 16px; }
    .msg-detail-body h2 { font-size: 14px; }
    .msg-detail-body h3 { font-size: 13px; }

    .msg-detail-body p {
      margin: 6px 0;
    }

    .msg-detail-body code {
      background: var(--term-bg-elevated, #12121a);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 12px;
    }

    .msg-detail-body pre {
      background: var(--term-bg-elevated, #12121a);
      padding: 8px 12px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      margin: 8px 0;
    }

    .msg-detail-body pre code {
      background: none;
      padding: 0;
    }

    .msg-detail-body ul, .msg-detail-body ol {
      padding-left: 20px;
      margin: 6px 0;
    }

    .msg-detail-footer {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      width: 100%;
    }
  </style>
</template>
