<template>
  <div class="cur-widget" ui-class-cur-widget-ext="isExternal()" ui-class-cur-widget-remove="removeMode">
    <div class="cur-widget-row">
      <sl-tooltip content="Fire: commit this tag operation now">
        <sl-icon-button name="send-fill"
                        class="cur-widget-fire"
                        ui-action="fire()"
                        ui-attr-disabled="fireDisabled()"
                        label="Fire"></sl-icon-button>
      </sl-tooltip>
      <sl-input
        size="small"
        class="cur-widget-tag"
        placeholder="tag"
        ui-value="tagName?keypress"
        ui-event-sl-change="onTagNameChange()"
      ></sl-input>
      <sl-input
        size="small"
        class="cur-widget-value"
        placeholder="value"
        ui-value="tagValue?keypress"
        ui-attr-disabled="removeMode"
      ></sl-input>
      <sl-tooltip content="Disposition: int writes the tag into the file body, ext routes it via @ext mirror">
        <sl-button size="small"
                   class="cur-widget-disposition"
                   ui-action="toggleDisposition()"
                   ui-attr-disabled="dispositionLocked()"
        ><span ui-value="dispositionLabel()"></span></sl-button>
      </sl-tooltip>
      <sl-tooltip content="add appends another value; replace collapses the tag's values to this one">
        <sl-button size="small"
                   class="cur-widget-replace"
                   ui-action="toggleReplace()"
                   ui-attr-disabled="removeMode"
        ><span ui-value="replaceLabel()"></span></sl-button>
      </sl-tooltip>
      <sl-tooltip content="Remove this tag instead">
        <sl-checkbox
          size="small"
          ui-attr-checked="removeMode"
          ui-event-sl-change="toggleRemove()"
        >rem</sl-checkbox>
      </sl-tooltip>
      <sl-tooltip content="Discard this widget">
        <sl-icon-button name="x-lg" ui-action="kill()" label="Kill"></sl-icon-button>
      </sl-tooltip>
    </div>

    <div class="cur-widget-ext-row" ui-class-hidden="isInternal()">
      <sl-select
        size="small"
        class="cur-widget-base"
        ui-value="extBase"
        ui-event-sl-change="onBaseChange()"
      >
        <sl-option value="uuid">UUID</sl-option>
        <sl-option value="path">path</sl-option>
      </sl-select>
      <sl-select
        size="small"
        class="cur-widget-locator-kind"
        ui-value="extLocatorKind"
        ui-event-sl-change="onLocatorKindChange()"
      >
        <sl-option value="string">string</sl-option>
        <sl-option value="regex">regex</sl-option>
        <sl-option value="absolute">absolute</sl-option>
        <sl-option value="bare">bare</sl-option>
      </sl-select>
      <sl-input
        size="small"
        class="cur-widget-locator-text"
        placeholder="locator"
        ui-value="extLocatorText?keypress"
        ui-attr-disabled="locatorBare()"
      ></sl-input>
    </div>

    <div class="cur-widget-flags" ui-class-hidden="isInternal()">
      <span class="cur-widget-dup" ui-class-hidden="noDupFlag()" ui-value="dupFlag()"></span>
      <span class="cur-widget-scope" ui-class-hidden="noScopeReadout()" ui-value="scopeReadout()"></span>
    </div>

    <div class="cur-widget-fire-error" ui-class-hidden="noFireError()">
      <span ui-value="fireError()"></span>
      <sl-icon-button name="x-lg" ui-action="clearFireError()" label="Dismiss error"></sl-icon-button>
    </div>
  </div>
</template>
