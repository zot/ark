    <script>
    // Load <ark-search> custom element + theme CSS (idempotent)
    if (!customElements.get('ark-search')) {
      var s = document.createElement('script');
      s.type = 'module';
      s.src = '/ark-search-element.js';
      document.head.appendChild(s);
      var c = document.createElement('link');
      c.rel = 'stylesheet';
      c.href = '/ark-search-element.css';
      document.head.appendChild(c);
    }

    // Wire SearchAPI to ark HTTP endpoints once the element is ready
    (function wireArkSearch() {
      var el = document.getElementById('ark-search-el');
      if (!el) return;

      function getSidebarFilters() {
        var bridge = document.getElementById('ark-filter-bridge');
        if (!bridge) return {};
        try { return JSON.parse(bridge.textContent || '{}'); } catch(e) { return {}; }
      }

      var api = {
        search: function(query, mode) {
          var sidebar = getSidebarFilters();
          return fetch('/search/grouped', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              query: query,
              mode: mode,
              filter_files: sidebar.filter_files,
              exclude_files: sidebar.exclude_files,
            }),
          }).then(function(r) { return r.json(); });
        },
        searchFiltered: function(query, request) {
          var sidebar = getSidebarFilters();
          var ff = request.filterFiles && request.filterFiles.length ? request.filterFiles : sidebar.filter_files;
          var ef = request.excludeFiles && request.excludeFiles.length ? request.excludeFiles : sidebar.exclude_files;
          return fetch('/search/grouped', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              query: query,
              mode: request.mode,
              chunk_filters: request.chunkFilters,
              filter_files: ff,
              exclude_files: ef,
              name_tokens: request.nameTokens,
              value_tokens: request.valueTokens,
              name_match: request.nameMatch,
            }),
          }).then(function(r) { return r.json(); });
        },
        tagComplete: function(prefix) {
          return fetch('/tags/complete', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prefix: prefix}),
          }).then(function(r) { return r.json(); });
        },
        tagValueComplete: function(tag, prefix) {
          return fetch('/tags/values', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tag: tag, prefix: prefix}),
          }).then(function(r) { return r.json(); });
        },
        navigate: function(path) {
          window.open('/content' + path, '_blank');
        },
      };

      // Retry until the element is defined and ready
      function tryWire() {
        if (el.api !== undefined) {
          el.api = api;
        } else {
          setTimeout(tryWire, 100);
        }
      }
      tryWire();
    })();
    </script>

  <script>
  (function() {
    function setup() {
      var handle = document.querySelector('.ark-resize-handle');
      var panel = document.querySelector('.ark-sources');
      if (!handle || !panel) return;

      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        handle.classList.add('ark-resizing');
        var startX = e.clientX;
        var startWidth = panel.offsetWidth;

        function onMove(e) {
          var newWidth = startWidth + (e.clientX - startX);
          if (newWidth >= 180 && newWidth <= window.innerWidth * 0.5) {
            panel.style.width = newWidth + 'px';
          }
        }

        function onUp() {
          handle.classList.remove('ark-resizing');
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }

        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setup);
    } else {
      setup();
    }
  })();
  </script>
