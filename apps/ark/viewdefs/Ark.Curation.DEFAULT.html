<template>
  <div class="cur-app">
    <div class="cur-header panel-header">
      <span class="panel-title">Tag Forge</span>
      <span class="cur-status" ui-value="sweepStatusText()" ui-class-cur-busy="sweepBusy()"></span>
      <div class="cur-header-actions">
        <sl-tooltip content="Run hot-correlations sweep (async)">
          <sl-icon-button name="lightning-charge-fill" ui-action="sweepNow()" ui-attr-disabled="sweepBusy()" label="Sweep"></sl-icon-button>
        </sl-tooltip>
        <sl-tooltip content="Find connections across pinned chunks">
          <sl-icon-button name="diagram-3" ui-action="findConnections()" ui-attr-disabled="connectionsInFlight()" label="Find connections"></sl-icon-button>
        </sl-tooltip>
        <sl-tooltip content="Dismiss every pinned chunk with no changes">
          <sl-button size="small" ui-action="clearUnchanged()" ui-attr-disabled="noUnchanged()">
            <sl-icon slot="prefix" name="eraser"></sl-icon>
            Clear unchanged
          </sl-button>
        </sl-tooltip>
        <sl-button
          size="small"
          variant="primary"
          class="cur-accept-button"
          ui-action="acceptChanges()"
          ui-attr-disabled="acceptDisabled()"
        ><span ui-value="acceptLabel()"></span></sl-button>
      </div>
    </div>

    <!-- Accept warning dialog -->
    <sl-dialog label="Pending changes not staged"
               class="cur-accept-warn-dialog"
               ui-attr-open="acceptWarnVisible()"
               ui-event-sl-request-close="cancelAccept()">
      <p>There are <span ui-value="pendingCount()"></span> pending changes you have not staged.</p>
      <p class="cur-warn-hint">Pending widgets are not executed until you promote them via the per-card edit button.</p>
      <sl-button slot="footer" variant="primary" ui-action="confirmAccept()">Save staged changes only</sl-button>
      <sl-button slot="footer" ui-action="cancelAccept()">Go back to editing</sl-button>
    </sl-dialog>

    <!-- Find Connections proposals panel -->
    <div class="cur-conn-panel" ui-class-hidden="noConnections()">
      <div class="cur-conn-header">
        <span class="cur-conn-title">Find Connections</span>
        <span class="cur-conn-status" ui-value="connectionsStatusText()"></span>
        <sl-tooltip content="Dismiss the proposals panel">
          <sl-icon-button name="x-lg" ui-action="clearConnections()" label="Dismiss"></sl-icon-button>
        </sl-tooltip>
      </div>
      <sl-alert variant="danger"
                ui-attr-open="hasConnectionsError()"
                class="cur-conn-error">
        <sl-icon slot="icon" name="exclamation-triangle"></sl-icon>
        <span ui-value="connectionsError()"></span>
      </sl-alert>
      <div class="cur-conn-themes" ui-class-hidden="noConnectionsThemes()">
        <div class="cur-conn-section-header">Themes (<span ui-value="connectionsThemeCount()"></span>)</div>
        <div ui-view="connectionsThemes()?wrapper=lua.ViewList"></div>
      </div>
      <div class="cur-conn-shared" ui-class-hidden="noConnectionsSharedTags()">
        <div class="cur-conn-section-header">Shared tag candidates (<span ui-value="connectionsSharedTagCount()"></span>)</div>
        <div ui-view="connectionsSharedTags()?wrapper=lua.ViewList"></div>
      </div>
    </div>

    <div class="cur-body">
      <!-- Left: pinned-chunks workspace -->
      <div class="cur-pinned-panel">
        <div class="cur-pinned-header">
          <span class="cur-pinned-title">Pinned chunks</span>
          <span class="cur-pinned-count" ui-value="pinnedCount()"></span>
          <span class="cur-new-pill" ui-class-hidden="noNew()" ui-value="newCount()"></span>
          <sl-tooltip content="Drop everything below the topmost pin">
            <sl-icon-button name="layer-backward" ui-action="sweepOlder()" ui-attr-disabled="noPinned()" label="Sweep older"></sl-icon-button>

        <div class="cur-pinned-empty" ui-class-hidden="hasPinned()">

          <p>No chunks pinned yet.</p>
          <p class="cur-empty-hint">Curate from search results or pin chunks from a focused tag.</p>

        <div class="cur-pinned-list" ui-class-hidden="noPinned()">

            <span class="cur-focused-tag" ui-value="focusedTag"></span>

            </div>

    .cur-pin-chunk-text {

    }
    .cur-pin-chunk-text::part(content) {
      padding: 0;
    }

    /* Chunk-text iframe + click-shield.
       Wrapper uses max-height so short chunks shrink to their natural
       size. The iframe's height is set explicitly by iframeBridgeCode
       from contentDocument.body.scrollHeight (capped at 280px) — a
       % height here would collapse against the wrapper's auto height.
       The 280px fallback keeps the first paint sized correctly before
       the bridge measures. */
    .cur-pin-chunk-readonly {
      position: relative;
      width: 100%;
      max-height: 280px;
      overflow: hidden;
    }
    .cur-pin-iframe {
      width: 100%;
      height: 280px;
      border: 0;
      background: var(--term-bg, #0a0a0f);
      display: block;
      cursor: text;
    }

    /* CM6 editor mount. Wrapper uses max-height so short chunks
       shrink to fit; CM6's own .cm-scroller handles overflow inside
       the .cm-editor's max-height. The mount has no height — letting
       it auto-size to the editor — and explicit ?wrapper/scroller
       rules below tell CM6 to cap and scroll itself. */
    .cur-pin-chunk-editor {
      width: 100%;
      max-height: 280px;
      background: var(--term-bg, #0a0a0f);
    }
    .cur-pin-editor-mount {
      width: 100%;
      caret-color: var(--term-accent-bright, #ff9966);
    }
    .cur-pin-editor-mount .cm-editor {
      max-height: 280px;
    }
    .cur-pin-editor-mount .cm-scroller {
      overflow: auto;
    }
    /* CodeMirror's cursor element + the document area's caret. The
       editor copies caret-color from the host, but cm-cursor's color
       is set by the cm theme — we override so the cursor is visible
       on our dark surface. */
    .cur-pin-editor-mount .cm-cursor,
    .cur-pin-editor-mount .cm-dropCursor {
      border-left-color: var(--term-accent-bright, #ff9966);
    }
    /* Hide the ink-mde "powered by" attribution row at the bottom of
       each embedded editor — it stacks up across pin cards and steals
       vertical space we want for chunk text. */
    .cur-pin-editor-mount .ink-mde-attribution {
      display: none;
    }
