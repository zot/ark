  <div class="cur-current-tag"
       ui-class-cur-current-tag-ext="isExt()"
       ui-class-cur-current-tag-inline="isInline()">
    <sl-tooltip content="Load a replace widget pre-filled from this tag">
      <sl-input size="small"
                class="cur-current-tag-name"
                readonly
                ui-value="name"
                ui-event-click="loadReplaceWidget()"></sl-input>
    </sl-tooltip>
    <sl-input size="small"
              class="cur-current-tag-value"
              readonly
              ui-value="value"
              ui-event-click="loadReplaceWidget()"></sl-input>
    <span class="cur-current-tag-ext-file" ui-class-hidden="isInline()" ui-value="externalfile"></span>
    <sl-tooltip content="Load a remove widget for this tag">
      <sl-icon-button name="dash-circle"
                      class="cur-current-tag-rem"
                      ui-action="loadRemoveWidget()"
                      label="Remove"></sl-icon-button>
    </sl-tooltip>
  </div>
</template>
