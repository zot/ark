<template>
  <div class="cur-pin" ui-class-cur-pin-new="isNew()">
    <div class="cur-pin-header">
      <span class="cur-pin-new-pill" ui-class-hidden="notNew()">NEW</span>
      <a class="cur-pin-path" target="_blank" ui-attr-href="contentURL()" ui-value="shortPath()"></a>
      <sl-icon-button name="x-lg" ui-action="dismiss()" label="Dismiss"></sl-icon-button>
    </div>

    <div class="cur-pin-suggestions">
      <div class="cur-pin-suggestions-error" ui-class-hidden="noSuggestionsError()" ui-value="suggestionsError()"></div>
      <div class="cur-pin-suggestions-empty" ui-class-hidden="hasSuggestions()">No tag candidates.</div>
      <div ui-view="suggestions()?wrapper=lua.ViewList"></div>
    </div>
  </div>
</template>
